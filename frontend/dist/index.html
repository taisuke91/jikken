<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>暴言ランク・炎上指数</title>
  <link rel="stylesheet" href="/assets/style.css" />
</head>
<body>
  <div class="bg"></div>
  <main class="panel">
    <header>
      <h1>暴言ランク</h1>
      <p class="sub">マイクで吹き込むと Gemini が炎上指数（1～10）を JSON スキーマで返します</p>
    </header>

    <section class="controls">
      <div class="btn-row">
        <button type="button" id="btnRecord" class="primary">録音して判定（音声を API へ）</button>
        <button type="button" id="btnSpeech" class="ghost">ブラウザ認識 → テキスト判定</button>
      </div>
      <p id="recStatus" class="hint">録音: 停止中</p>
      <p id="speechHint" class="hint">※ Web Speech は Chrome 推奨。マイク許可が必要です。</p>
    </section>

    <section class="manual-test">
      <h2 class="section-title">テスト（マイコンのみ）</h2>
      <p class="hint">Gemini なし。押した数字をそのままシリアル送信（<code>SERIAL_PORT</code> 設定時）</p>
      <div class="manual-grid" id="manualGrid" aria-label="スコア 1〜10"></div>
      <p id="manualStatus" class="hint manual-status">—</p>
    </section>

    <section class="meter" aria-live="polite">
      <div class="score-wrap">
        <span class="score" id="scoreNum">—</span>
        <span class="max">/10</span>
      </div>
      <p class="label" id="scoreLabel">待機中</p>
      <div class="bar-track">
        <div class="bar-fill" id="barFill"></div>
      </div>
    </section>

    <section class="log">
      <h2>直近の応答</h2>
      <pre id="rawOut">（まだありません）</pre>
    </section>
  </main>
  <script src="/assets/app.js"></script>
</body>
</html>
