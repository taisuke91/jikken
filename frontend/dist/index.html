<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="color-scheme" content="light" />
  <title>暴言ランク</title>
  <!-- CSS が読めない環境でも黄土背景・ダークモードの黒画面を避ける -->
  <style>
    html {
      color-scheme: light;
      background-color: #fffaf4;
    }
    body {
      margin: 0;
      min-height: 100vh;
      background-color: #fffaf4;
      color: #1c1612;
    }
  </style>
  <link rel="stylesheet" href="/assets/style.css?v=ochre5" />
</head>
<body>
  <main id="appMain">
    <header class="hero">
      <h1 class="hero-title"><span class="hero-flame" aria-hidden="true">🔥</span> 暴言ランク</h1>
      <p class="sub">録音を送ると AI が判定し、状態 0〜3 が Arduino に送られます。</p>
    </header>

    <section class="meter" aria-live="polite">
      <div class="score-wrap">
        <span class="score" id="scoreNum">—</span>
        <span class="max">/3</span>
      </div>
      <p class="label" id="scoreLabel">待機中</p>
      <div class="bar-track">
        <div class="bar-fill" id="barFill"></div>
      </div>
    </section>

    <section class="controls">
      <button type="button" id="btnRecord" class="btn-record">録音して判定</button>
      <div id="recLevelWrap" class="rec-level-wrap rec-level-wrap--hide" aria-hidden="true">
        <span class="rec-level-label">入力レベル</span>
        <div id="recLevelTrack" class="rec-level-track" role="meter" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0" aria-label="マイク音量">
          <div class="rec-level-fill" id="recLevelFill"></div>
        </div>
        <span class="rec-level-label rec-waveform-label">波形（マイクに届いている音）</span>
        <canvas
          id="recWaveform"
          class="rec-waveform"
          width="600"
          height="112"
          aria-hidden="true"
        ></canvas>
        <p class="rec-waveform-hint">話すと波形が動きます。バーと波形が無音ではほぼ止まります。</p>
      </div>
      <p id="recStatus" class="hint rec-hint">停止中</p>
    </section>

    <aside id="flareCallout" class="flare-callout flare-callout--hide" aria-hidden="true">
      <span class="flare-callout__icon" aria-hidden="true">🔥</span>
      <div class="flare-callout__body">
        <strong class="flare-callout__title">炎上モードが点灯しています</strong>
        <p id="flareCalloutText" class="flare-callout__text"></p>
      </div>
    </aside>

    <section class="manual-test">
      <h2 class="section-title">マイコン送信（0〜3）</h2>
      <p class="hint"><code>SERIAL_PORT</code> があるときだけ</p>
      <div class="manual-grid" id="manualGrid" aria-label="状態 0〜3"></div>
      <p id="manualStatus" class="hint manual-status">—</p>
    </section>

    <section class="log">
      <details>
        <summary>レスポンス JSON</summary>
        <pre id="rawOut">（まだありません）</pre>
      </details>
    </section>
  </main>
  <script src="/assets/app.js?v=ochre5"></script>
</body>
</html>
